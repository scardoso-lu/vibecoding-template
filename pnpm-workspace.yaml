# pnpm settings for this project.
#
# Supply-chain cooldown: refuse to install any npm package version published less
# than 14 days ago. Defends against freshly-published malicious releases — the
# typical npm attack lands and is yanked within hours/days, so a cooldown dodges it.
#
# Value is in MINUTES (14 days = 20160). Requires a recent pnpm 10.x.
# scripts/bootstrap.* keep this in sync with scripts/lib/versions.env.
minimumReleaseAge: 20160

# Packages allowed to bypass the cooldown (e.g. an urgent internal fix). Keep empty.
minimumReleaseAgeExclude: []
